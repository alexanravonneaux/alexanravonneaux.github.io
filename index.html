<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Alexan Ravonneaux — Data Scientist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio d'Alexan Ravonneaux, étudiant en BUT Science des Données à l'IUT de Niort.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      background: #000;
    }

    /* ── Background image ── */
    .hero-bg {
      position: fixed;
      inset: 0;
      background-image: url('img/oleron.JPG');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.55);
      transform: scale(1.04);
      animation: bgDrift 25s ease-in-out infinite alternate;
    }
    @keyframes bgDrift {
      from { transform: scale(1.04) translate(0, 0); }
      to   { transform: scale(1.08) translate(-1%, 1%); }
    }

    /* ── Gradient overlay — Apple keynote style ── */
    .hero-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.10) 0%,
        rgba(0,0,0,0.20) 40%,
        rgba(0,0,0,0.65) 100%
      );
    }

    /* ── Contenu centré ── */
    .hero-content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      padding: 0 24px;
      animation: heroFadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      font-size: 0.82em;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero-name {
      font-size: clamp(3.5em, 9vw, 7.5em);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.0;
      margin-bottom: 18px;
    }

    .hero-tagline {
      font-size: clamp(1em, 2.5vw, 1.3em);
      font-weight: 400;
      color: rgba(255,255,255,0.78);
      letter-spacing: -0.01em;
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-hero-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.95);
      color: #1d1d1f;
      text-decoration: none;
      border-radius: 100px;
      padding: 14px 28px;
      font-size: 0.92em;
      font-weight: 700;
      font-family: inherit;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .btn-hero-primary:hover {
      background: #fff;
      transform: scale(1.03);
    }

    .btn-hero-ghost {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-radius: 100px;
      padding: 14px 28px;
      font-size: 0.92em;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid rgba(255,255,255,0.28);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .btn-hero-ghost:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.03);
    }

    /* ── Stats bar (bas de page) ── */
    .hero-stats {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 24px 40px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      animation: heroFadeIn 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }

    .stat-item {
      text-align: center;
      color: white;
      padding: 0 40px;
    }

    .stat-item + .stat-item {
      border-left: 1px solid rgba(255,255,255,0.18);
    }

    .stat-num {
      font-size: 2em;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.72em;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Scroll cue ── */
    .scroll-cue {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.5);
      font-size: 0.7em;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: cueFloat 2.5s ease-in-out infinite;
    }
    @keyframes cueFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
      50%       { transform: translateX(-50%) translateY(6px); opacity: 0.8; }
    }
    .scroll-cue svg { opacity: 0.6; }

    @media (max-width: 600px) {
      .stat-item { padding: 0 20px; }
      .stat-num  { font-size: 1.5em; }
      .hero-stats { padding: 20px 16px 28px; }
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-eyebrow">BUT Science des Données · IUT de Niort</div>
    <div class="hero-name">Alexan Ravonneaux</div>
    <div class="hero-tagline">
      Analyser. Modéliser. Visualiser.<br>
      Transformer la donnée en décision.
    </div>
    <div class="hero-btns">
      <a href="portfolio.html" class="btn-hero-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Découvrir mon portfolio
      </a>
      <a href="projets.html" class="btn-hero-ghost">
        Voir mes projets →
      </a>
    </div>
  </div>

  <div class="scroll-cue">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    Explorer
  </div>

  <div class="hero-stats">
    <div class="stat-item">
      <div class="stat-num">24+</div>
      <div class="stat-label">Projets</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">2</div>
      <div class="stat-label">Années BUT</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">10+</div><div class="stat-label">Technologies</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">1</div>
      <div class="stat-label">Stage</div>
    </div>
  </div>
</body>
</html>
